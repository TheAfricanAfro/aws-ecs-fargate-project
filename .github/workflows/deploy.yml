name: Deploy to ECS

on:
  push:
    branches:
      - master



jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch Code
        uses: actions/checkout@v3

        #Best Practice is to use Role w/ OpenID connect.
        #Come back to this after MVP is obtained.
      - name: Configure AWS Credentials 
        uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2
        
          #Signing into ECR
      - name: Amazon ECR "Login" Action for GitHub Actions
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2.0.1

      - name: Build, tag, and push docker image to Amazon ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: production/project-repo
          IMAGE_TAG: ${{ github.sha }} #SHA gives each image a unique tag
        run: |
          docker build -t $REGISTRY/$REPOSITORY:$IMAGE_TAG ./app
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG
          docker tag $REGISTRY/$REPOSITORY:$IMAGE_TAG $REGISTRY/$REPOSITORY:latest
          docker push $REGISTRY/$REPOSITORY:latest
          
      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: task-definition.json
          service: project-service
          cluster: project-cluster
          wait-for-service-stability: true



