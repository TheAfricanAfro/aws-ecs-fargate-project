name: Deploy to ECS

on:
  push:
    branches:
      - main



jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch Code
        uses: actions/checkout@v3

        #Best Practice is to use Role w/ OpenID connect.
        #Come back to this after MVP is obtained.
      - name: "Configure AWS Credentials" 
        uses: aws-actions/configure-aws-credentials@v6.0.0
        with: 
          aws-region: us-east-2

